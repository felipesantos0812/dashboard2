<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dashboard EXP</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="topbar">

    <div>

      <h1>
        Dashboard EXP
      </h1>

      <p>
        Dashboard operacional
      </p>

    </div>

    <button onclick="toggleDarkMode()">
      🌙 Claro / Escuro
    </button>

  </div>

  <!-- KPIs -->
  <div class="cards">

    <div class="card">
      <h3>Total Bipado</h3>

      <div id="kpiTotal">
        0
      </div>
    </div>

    <div class="card">
      <h3>Melhor Operador</h3>

      <div id="kpiTop">
        -
      </div>
    </div>

    <div class="card">
      <h3>Média</h3>

      <div id="kpiMedia">
        0
      </div>
    </div>

    <div class="card">
      <h3>Abaixo Meta</h3>

      <div id="kpiRuim">
        0
      </div>
    </div>

  </div>

  <!-- GRAFICO -->
  <div class="card">

    <h2>
      Ranking
    </h2>

    <canvas id="rankingChart"></canvas>

  </div>

  <!-- HORAS -->
  <div class="card">

    <h2>
      Produção por Hora
    </h2>

    <canvas id="hourChart"></canvas>

  </div>

  <!-- TABELA -->
  <div class="card">

    <h2>
      Colaboradores
    </h2>

    <table>

      <thead>

        <tr>

          <th>
            Nome
          </th>

          <th>
            Pedidos
          </th>

          <th>
            Status
          </th>

        </tr>

      </thead>

      <tbody id="tabelaColaboradores">

      </tbody>

    </table>

  </div>

  <!-- PAUSAS -->
  <div class="card">

    <h2>
      Pausas
    </h2>

    <div id="pausasContainer">

    </div>

  </div>

  <!-- LIBS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>

</html>
