<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dashboard EXP</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <!-- CHART -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- CSV -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

  <div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div>

        <div class="logo">

          <h1>
            Dashboard EXP
          </h1>

          <p>
            Controle Operacional
          </p>

        </div>

        <div class="menu">

          <div class="menu-item">
            📦 Produtividade
          </div>

          <div class="menu-item">
            📈 Ranking
          </div>

          <div class="menu-item">
            ⏱ Pausas
          </div>

          <div class="menu-item">
            👥 Colaboradores
          </div>

        </div>

      </div>

      <div class="bottom-info">

        <div
          class="clock"
          id="clock"
        >
          00:00
        </div>

        <div
          class="date"
          id="date"
        >
          --
        </div>

        <button
          class="toggle-btn"
          onclick="toggleDarkMode()"
        >
          🌙 Claro / Escuro
        </button>

      </div>

    </aside>

    <!-- CONTEUDO -->
    <main class="content">

      <!-- KPIs -->
      <div class="cards">

        <div class="card">

          <div class="kpi-title">
            Total Bipado
          </div>

          <div
            class="kpi-value"
            id="kpiTotal"
          >
            0
          </div>

        </div>

        <div class="card">

          <div class="kpi-title">
            Melhor Operador
          </div>

          <div
            class="kpi-value"
            id="kpiTop"
          >
            -
          </div>

        </div>

        <div class="card">

          <div class="kpi-title">
            Média
          </div>

          <div
            class="kpi-value"
            id="kpiMedia"
          >
            0
          </div>

        </div>

        <div class="card">

          <div class="kpi-title">
            Abaixo da Meta
          </div>

          <div
            class="kpi-value"
            id="kpiRuim"
          >
            0
          </div>

        </div>

      </div>

      <!-- GRAFICOS -->
      <div class="grid">

        <div class="card">

          <h2>
            TOP 5 Operadores
          </h2>

          <canvas id="rankingChart"></canvas>

        </div>

        <div class="card">

          <h2>
            Pausas
          </h2>

          <div id="pausasContainer"></div>

        </div>

      </div>

      <!-- BAIXO -->
      <div class="grid">

        <div class="card">

          <h2>
            Produção por Hora
          </h2>

          <canvas id="hourChart"></canvas>

        </div>

        <div class="card">

          <h2>
            Colaboradores
          </h2>

          <table>

            <thead>

              <tr>

                <th>Nome</th>

                <th>Qtd</th>

                <th>Status</th>

              </tr>

            </thead>

            <tbody id="tabelaColaboradores">

            </tbody>

          </table>

        </div>

      </div>

    </main>

  </div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>

</html>
